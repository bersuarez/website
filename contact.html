  <main class="contact-page">
    <div class="grid-bg" aria-hidden="true"></div>

    <div class="contact-card">
      <div style="width:56px;height:56px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#4ade80" stroke-width="1.5"/><polyline points="22,6 12,13 2,6" stroke="#4ade80" stroke-width="1.5"/></svg>
      </div>

      <a href="mailto:info@backbonesystems.io" class="contact-email-link" id="email-cta">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.5"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="1.5"/></svg>
        info@backbonesystems.io
      </a>
      <hr class="contact-divider" />
      <p class="contact-info">
        Empowering top companies to become world-class fintechs.<br/>
        <a href="https://www.linkedin.com/company/backbonesystems/" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;margin-top:8px;display:inline-flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
